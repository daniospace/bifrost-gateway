name: Backend CI

on:
  push:
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gateway
        ports: ['5435:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Vet
        run: cd backend && go vet ./...

      - name: Test
        run: cd backend && go test ./... -race -coverprofile=coverage.out
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5435/gateway?sslmode=disable

      - name: Build binary
        run: cd backend && go build -o gateway main.go