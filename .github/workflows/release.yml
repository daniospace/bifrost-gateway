name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Embed & build unified binary (multi-platform)
        run: |
          rm -rf backend/out && cp -r frontend/out backend/out
          cd backend
          GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ../dist/aurallm-linux-amd64 main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ../dist/aurallm-darwin-arm64 main.go
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ../dist/aurallm-windows-amd64.exe main.go

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true